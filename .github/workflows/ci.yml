name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    name: Lint / Typecheck / Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test

  e2e:
    name: E2E (${{ matrix.shard_label }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: lint-typecheck-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            shard: ""
            shard_label: chromium
          - project: firefox
            shard: ""
            shard_label: firefox
          - project: mobile
            shard: "--shard=1/2"
            shard_label: mobile-1of2
          - project: mobile
            shard: "--shard=2/2"
            shard_label: mobile-2of2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local
        run: supabase start

      - name: Apply migrations + seeds
        run: supabase db reset

      - name: Verify seed application + re-apply if needed
        run: |
          DB_NAME=$(docker ps --format '{{.Names}}' | grep '^supabase_db_' | head -1)
          BOOKINGS=$(docker exec "$DB_NAME" psql -U postgres -At -c "SELECT count(*) FROM bookings WHERE id::text LIKE 'b0000000%';")
          REVIEWS=$(docker exec "$DB_NAME" psql -U postgres -At -c "SELECT count(*) FROM reviews WHERE id::text LIKE 'f0000000%';")
          echo "bookings (b0000000-*): $BOOKINGS / 18"
          echo "reviews  (f0000000-*): $REVIEWS / 6"
          if [ "$BOOKINGS" != "18" ]; then
            echo "Re-applying 03_bookings.sql..."
            docker exec -i "$DB_NAME" psql -U postgres < supabase/seed/03_bookings.sql
          fi
          if [ "$REVIEWS" != "6" ]; then
            echo "Re-applying 04_payments.sql + 05_reviews.sql..."
            docker exec -i "$DB_NAME" psql -U postgres < supabase/seed/04_payments.sql
            docker exec -i "$DB_NAME" psql -U postgres < supabase/seed/05_reviews.sql
          fi

      - name: Configure .env.local for Next.js
        run: |
          API_URL=$(supabase status -o env | grep '^API_URL=' | cut -d'=' -f2 | tr -d '"')
          ANON_KEY=$(supabase status -o env | grep '^ANON_KEY=' | cut -d'=' -f2 | tr -d '"')
          SERVICE_ROLE_KEY=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d'=' -f2 | tr -d '"')
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "NEXTAUTH_SECRET=ci-secret-for-testing-only-32-chars-min"
            echo "NEXTAUTH_URL=http://localhost:4000"
          } > .env.local

      - name: Determine browser
        id: browser
        run: |
          case "${{ matrix.project }}" in
            chromium) echo "name=chromium" >> $GITHUB_OUTPUT ;;
            firefox)  echo "name=firefox"  >> $GITHUB_OUTPUT ;;
            mobile)   echo "name=webkit"   >> $GITHUB_OUTPUT ;;
          esac

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps ${{ steps.browser.outputs.name }}

      - name: Run Playwright tests (${{ matrix.shard_label }})
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4000
          PORT: 4000
        run: pnpm exec playwright test --project=${{ matrix.project }} ${{ matrix.shard }} --reporter=line

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard_label }}
          path: playwright-report
          retention-days: 7

  lighthouse:
    name: Lighthouse CI (perf / a11y / SEO)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-typecheck-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase + apply seed
        run: |
          supabase start
          supabase db reset

      - name: Configure .env.local
        run: |
          API_URL=$(supabase status -o env | grep '^API_URL=' | cut -d'=' -f2 | tr -d '"')
          ANON_KEY=$(supabase status -o env | grep '^ANON_KEY=' | cut -d'=' -f2 | tr -d '"')
          SERVICE_ROLE_KEY=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d'=' -f2 | tr -d '"')
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "NEXTAUTH_SECRET=ci-secret-for-testing-only-32-chars-min"
            echo "NEXTAUTH_URL=http://localhost:4000"
          } > .env.local

      - name: Build Next.js (prod for stable LCP)
        run: pnpm exec next build

      - name: Start Next.js prod server
        run: |
          PORT=4000 pnpm exec next start -p 4000 > /tmp/next.log 2>&1 &
          until curl -sf http://localhost:4000 -o /dev/null; do sleep 2; done
          echo "Next.js prod ready"

      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
